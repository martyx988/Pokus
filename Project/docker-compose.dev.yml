services:
  postgres:
    image: postgres:16
    container_name: pokus-postgres-dev
    restart: unless-stopped
    environment:
      POSTGRES_DB: pokus
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - pokus_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d pokus"]
      interval: 10s
      timeout: 5s
      retries: 6

volumes:
  pokus_postgres_data:
