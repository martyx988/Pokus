services:
  postgres:
    image: postgres:16
    container_name: pokus-postgres-dev
    restart: unless-stopped
    environment:
      POSTGRES_DB: pokus
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - pokus_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d pokus"]
      interval: 10s
      timeout: 5s
      retries: 6
  dev-worker:
    image: python:3.11-slim
    container_name: pokus-dev-worker
    working_dir: /workspace
    env_file:
      - .env
    environment:
      PYTHONPATH: /workspace/src
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/pokus
    volumes:
      - ./:/workspace
    depends_on:
      postgres:
        condition: service_healthy
    entrypoint: ["python", "-m", "pokus_backend.worker"]

volumes:
  pokus_postgres_data:
